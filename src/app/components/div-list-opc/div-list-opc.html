<div class="bg-white rounded-2xl overflow-hidden shadow-sm flex cursor-pointer hover:shadow-md transition-shadow" [routerLink]="route()">
    <img [src]="url_img()" class="w-36 md:w-64 h-28 md:h-40 object-cover flex-shrink-0" [alt]="h3_text()" />
    <div class="flex-1 p-4 md:p-6 flex flex-col justify-center">
        <p class="text-xs text-gray-400 mb-1">{{ p_text() }}</p>
        <h3 class="text-base md:text-xl font-semibold text-gray-800">{{ h3_text() }}</h3>
    </div>
    <div class="flex items-center pr-3 md:pr-6 text-gray-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
    </div>
</div>

<div class="relative rounded-2xl overflow-hidden h-60 cursor-pointer group" [routerLink]="route()">
    <img [src]="url_img()" loading="lazy"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" alt="Habitaciones" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex items-end p-3">
        <span class="text-white font-semibold text-sm">{{ span_text() }}</span>
    </div>
</div>

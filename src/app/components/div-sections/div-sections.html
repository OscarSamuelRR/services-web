@if (href()) {
    <a [href]="href()" target="_blank" class="relative rounded-2xl overflow-hidden h-85 cursor-pointer group block">
        <img [src]="url_img()" [loading]="isLCP() ? 'eager' : 'lazy'" width="800" height="340" [class]="'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 ' + (imagePosition() ?? 'object-center')"  alt="" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col items-start justify-end p-3">
            @if (category_text()) {
                <span class="text-white/70 text-md uppercase tracking-widest mb-1 font-[family-name:--font-body]">{{ category_text() }}</span>
            }
            <span class="text-white font-semibold text-lg font-[family-name:--font-body]">{{ span_text() }}</span>
            @if (sub_text()) {
                <span class="text-white/80 text-sm mt-1 font-[family-name:--font-body]">{{ sub_text() }}</span>
            }
        </div>
    </a>
} @else {
    <div class="relative rounded-2xl overflow-hidden h-85 cursor-pointer group" [routerLink]="route()">
        <img [src]="url_img()" [loading]="isLCP() ? 'eager' : 'lazy'" width="800" height="340" [class]="'w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 ' + (imagePosition() ?? 'object-center')"  alt="" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col items-start justify-end p-3">
            @if (category_text()) {
                <span class="text-white/70 text-md uppercase tracking-widest mb-1 font-[family-name:--font-body]">{{ category_text()}}</span>
            }
            <span class="text-white font-semibold text-lg font-[family-name:--font-body]">{{ span_text() }}</span>
            @if (sub_text()) {
                <span class="text-white/80 text-sm mt-1 font-[family-name:--font-body]">{{ sub_text() }}</span>
            }
        </div>
    </div>
}

<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="title" [url_site]="'/experiences-tours'"></header-list>
    <div class="pt-8 mb-6 text-center">
        <h2 class="text-3xl font-semibold text-gray-800">Tours</h2>
        <!-- <p class="text-gray-400 text-base mt-2">Tomaremos su orden.</p> -->
        <p><strong>Ext. 205/206</strong></p>
        <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
    </div>

    @if (places.length > 0) {
        <div class="flex flex-wrap justify-center gap-0">
            @for (place of places; track place.id) {
            <div class="flex flex-col cursor-pointer group w-full md:w-1/2 lg:w-1/4">
                <div class="relative h-64 overflow-hidden">
                    <img [src]="place.image" loading="lazy"
                        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                        [alt]="place.name" />
                </div>
                <div class="bg-white px-5 py-4 border-b border-gray-100">
                    <p class="text-[#00633a] text-base font-semibold uppercase tracking-widest mb-1">
                        {{ place.category }}
                    </p>
                    <h3 class="text-gray-800 font-semibold text-2xl md:text-3xl lg:text-4xl mb-2">{{ place.name }}</h3>
                    <p class="text-gray-500 text-lg leading-relaxed whitespace-pre-line">{{ place.description }}</p>
                </div>
            </div>
            }
        </div>
    } @else {
        <div class="flex items-center justify-center py-20">
            <p class="text-gray-400">Tour no encontrado.</p>
        </div>
    }

</div>
<footer-component />

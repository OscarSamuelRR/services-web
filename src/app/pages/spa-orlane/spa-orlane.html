<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'spa.title' | translate" [url_site]="''"></header-list>
    <!-- GRID DE SECCIONES -->
    <div class="px-4 pb-6">
        <h2 class="pt-6 text-2xl md:text-3xl lg:text-4xl font-semibold text-gray-800 mb-4">{{ 'spa.services_title' | translate }}</h2>
        <div class="grid grid-cols-2 gap-3">
            <div-sections [url_img]="'/images/SpaOrleane.webp'" [isLCP]="true" href="https://spaorlane.com/es/servicios" [span_text]="'spa.sections.services_gym' | translate"  />

            <div-sections [url_img]="'/images/est.webp'" [isLCP]="true" [route]="'/spa-aesthetic'" [span_text]="'spa.sections.aesthetic' | translate" />

            <div-sections [url_img]="'/images/lealtad.webp'" [route]="'/loyalty-program-spa'" [span_text]="'spa.sections.loyalty' | translate" [imagePosition]="'object-bottom'" />

            <div-sections [url_img]="'/images/reglaspa.webp'" [route]="'/spa-rules'" [span_text]="'spa.sections.rules' | translate" />
        </div>
    </div>
</div>
<footer-component />

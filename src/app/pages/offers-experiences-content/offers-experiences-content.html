<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Ofertas y experiencias'" [url_site]="'/offers-experiences'"></header-list>

    @if (offer) {

    <!-- HERO -->
    <div class="relative h-64 md:h-96 overflow-hidden">
        <img [src]="offer.image" loading="lazy" class="w-full h-full object-cover" [class]="'w-full h-full object-cover ' + (offer.imagePosition ?? 'object-center')" alt="" />
        <div class="absolute inset-0 bg-black/40"></div>
        <button
            class="absolute top-4 left-4 text-white bg-white/20 backdrop-blur-sm rounded-full p-2 hover:bg-white/30 transition-colors"
            routerLink="/offers-experiences">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>
    </div>

    <!-- CONTENIDO -->
    <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">

        <!-- TÍTULO -->
        <div class="bg-white py-6 border-b border-gray-100">
            <h1 class="text-2xl md:text-3xl font-semibold text-gray-800 leading-snug">
                {{ offer.title }}
            </h1>
        </div>

        <!-- DESCRIPCIÓN -->
        <div class="bg-white py-6 border-b border-gray-100">
            <p class="text-gray-600 text-sm md:text-base leading-relaxed text-justify">
                {{ offer.description }}
            </p>
        </div>

        <!-- BOTONES -->
        <div class="bg-white py-6 flex flex-col md:flex-row items-center justify-between gap-4">

            @if (offer.whatsappUrl) {
            <a [href]="offer.whatsappUrl" target="_blank"
                class="w-full md:w-auto flex items-center justify-center gap-2 bg-[#00633a] text-white px-8 py-3 rounded-lg font-medium hover:bg-[#004d2d] active:scale-95 transition-all duration-200">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                </svg>
                Whatsapp
            </a>
            }

            @if (offer.phone) {
            <a href="tel:{{ offer.phone }}"
                class="w-full md:w-auto flex items-center justify-center gap-2 bg-[#00633a] text-white px-8 py-3 rounded-lg font-medium hover:bg-[#004d2d] active:scale-95 transition-all duration-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                {{ offer.phone }}
            </a>
            }

        </div>

    </div>

    } @else {
    <div class="flex items-center justify-center min-h-screen">
        <p class="text-gray-400">Oferta no encontrada.</p>
    </div>
    }

</div>
<footer-component />

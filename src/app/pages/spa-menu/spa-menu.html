<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Menú Alberca'" [url_site]="'/food-drinks'"></header-list>

    <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">
        <div class="pt-8 mb-10 text-center">
            <h2 class="text-3xl font-semibold text-gray-800">Menú del Spa Orlane</h2>
            <!-- <p class="text-gray-400 text-base mt-2">Tomaremos su orden.</p> -->
            <p>Tomaremos su orden en la <strong>Ext. 207</strong></p>
            <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
            <p class="text-black mt-1">La siguiente hoja muestra el menú del Spa Orlane.</p>
        </div>
        <!-- VISTA PDF -->
        <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">
            <pdf-viewer [src]="selectedPdf" [title]="selectedTitle" [showBack]="false">
            </pdf-viewer>
        </div>
        <div class="mt-10 bg-[#00633a]/10 rounded-2xl px-6 py-5 flex flex-col items-center text-center gap-3">
            <svg class="w-6 h-6 text-[#00633a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-[#00633a] text-base">
                Para solicitar algún alimento comuníquese a la extensión <strong>207</strong> y con gusto le
                atenderemos.
            </p>
        </div>
    </div>
</div>
<footer-component />

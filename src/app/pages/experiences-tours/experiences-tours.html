<!-- experiences-tour.component.html -->

<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Tours'" [url_site]="'/offers-experiences'"></header-list>

    <div class="px-4 md:px-12 lg:px-20 xl:px-32 pb-10">
        <!-- ENCABEZADO -->
        <div class="pt-8 mb-6 text-center">
            <h2 class="text-3xl font-semibold text-gray-800">Tours</h2>
            <!-- <p class="text-gray-400 text-base mt-2">Tomaremos su orden.</p> -->
            <p><strong>Ext. 205/206</strong></p>
            <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
        </div>
        <!-- GRID DE DESTINOS -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-3">
            <div-section-tour [url_img]="'/images/cuernavaca.jpg'" [route]="'/tour-page/cuernavaca'" [span_text]="'Cuernavaca'" />

            <div-section-tour [url_img]="'/images/tepoztlan.jpg'" [route]="'/tour-page/tepoztlan'" [span_text]="'Tepoztlán'" />

            <div-section-tour [url_img]="'/images/xochicalco.jpg'" [route]="'/tour-page/xochicalco'" [span_text]="'Xochicalco'" />
            
            <div-section-tour [url_img]="'/images/taxco.jpg'" [route]="'/tour-page/taxco'" [span_text]="'Ciudad de Taxco'" />

            <div-section-tour [url_img]="'/images/tours4.jpg'" [route]="'/tour-page/grutas'" [span_text]="'Grutas de Cacahuamilpa'" />

            <div-section-tour [url_img]="'/images/nayaa.jpg'" [route]="'/tour-page/casaresiu'" [span_text]="'Casa Resiú Nayaá'"/>
        </div>
        <!-- NOTA INFORMATIVA -->
        <div class="mt-8 bg-[#00633a]/10 rounded-2xl px-6 py-5 flex flex-col items-center text-center gap-3">
            <svg class="w-6 h-6 text-[#00633a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-[#00633a] text-base">
                Para contratar algún tour comuníquese a la <strong>Ext. 205/206</strong> y con gusto le atenderemos.
            </p>
        </div>
    </div>
</div>
<footer-component />

<div class="min-h-screen bg-white font-sans">
    <!-- HERO HEADER -->
    <div class="relative h-64 overflow-hidden">
        <img type="image/jpg" src="/images/alberca.webp" width="1200" height="256" priority alt="Hotel" class="w-full h-full object-cover" />
        <!-- Overlay oscuro -->
        <div class="absolute inset-0 bg-black/40"></div>
        <!-- Botón back -->
        <!-- <button class="absolute top-4 left-4 text-white bg-white/20 backdrop-blur-sm rounded-full p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button> -->
        <!-- Logo centrado -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
            <div class="text-white text-center">
                <!-- <p class="italic text-base tracking-[0.3em] uppercase opacity-80">Las Mañanitas</p>
                <h1 class="text-xl font-light tracking-widest uppercase">Hotel Garden Restaurant & Spa</h1> -->
                <div class="flex-shrink-0">
                    <img src="images/logo_lasmananitas_footer.png" loading="eager" alt="logo" class="h-32 md:h-32 lg:h-48 w-auto" />
                </div>
            </div>
        </div>
        <!-- Icono usuario -->
        <!-- <button class="absolute top-4 right-4 text-white bg-white/20 backdrop-blur-sm rounded-full p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button> -->
    </div>
    
    <div class="h-6 bg-gradient-to-b from-black/40 to-white"></div>

    <div class="flex items-center justify-end pr-4">
        <lang-switcher />
    </div>
    
    <div class="px-4 py-5 relative">
        <div class="flex items-center bg-[#00633a] rounded-full overflow-hidden shadow-lg px-4">
            <!-- Icono buscar -->
            <svg class="w-5 h-5 text-white opacity-80 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M16 10a6 6 0 11-12 0 6 6 0 0112 0z" />
            </svg>
            <!-- Input -->
            <input type="text" placeholder="{{ 'home.search_placeholder' | translate }}" [value]="searchQuery()"
                (input)="onSearch($any($event.target).value)"
                class="w-full bg-transparent text-white placeholder-white/70 py-3 text-sm md:text-base focus:outline-none" />
            <!-- Botón limpiar - solo aparece si hay texto -->
            @if (searchQuery()) {
                <button (click)="clearSearch()" class="ml-2 text-white/70 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            }
        </div>
        <!-- Sugerencias -->
        @if (searchResults().length > 0) {
            <div class="absolute left-4 right-4 mt-2 bg-white rounded-2xl shadow-xl overflow-hidden z-50">
                @for (result of searchResults(); track result.route) {
                    <button (click)="navigateTo(result.route)" class="w-full flex items-center gap-3 px-5 py-3 text-left cursor-pointer hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0">
                        <svg class="w-4 h-4 text-[#00633a] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-4.35-4.35M16 10a6 6 0 11-12 0 6 6 0 0112 0z" />
                        </svg>
                        <span class="text-gray-700 text-base">{{ result.label }}</span>
                        <svg class="w-4 h-4 text-gray-300 ml-auto flex-shrink-0" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                }
            </div>
        }
        <!-- Sin resultados -->
        @if (searchQuery().length >= 2 && searchResults().length === 0) {
            <div class="absolute left-4 right-4 mt-2 bg-white rounded-2xl shadow-xl overflow-hidden z-50">
                <div class="px-5 py-4 text-gray-400 text-sm text-center">
                    No se encontraron resultados para "{{ searchQuery() }}"
                </div>
            </div>
        }
    </div>
    <!-- GRID DE SECCIONES -->
    <div class="px-4 pb-6">
        <h2 class="text-2xl md:text-3xl lg:text-4xl font-semibold text-gray-800 mb-4">{{ 'home.services' | translate }}</h2>

        <div class="grid grid-cols-2 gap-3">

            <!-- Habitaciones -->
            <div-sections [url_img]="'/images/opcion3.webp'" [isLCP]="true" [route]="'/hotel-services'" [span_text]="'div_sections_home.hotel_services' | translate" [imagePosition]="'object-bottom'"/>

            <!-- Restaurante -->
            <div-sections [url_img]="'/images/rest112.webp'" [isLCP]="true" [route]="'/food-drinks'" [span_text]="'div_sections_home.food_drinks' | translate" />
            
            <!-- Spa -->
            <div-section-big [url_img]="'/images/spa3.webp'" [isLCP]="true" [route]="'/spa-orlane'" [span_text]="'div_sections_home.spa_orlane' | translate" [imagePosition]="'object-center'"/>
            
            <!-- Instalaciones -->
            <!-- <div-sections [url_img]="'/images/instal.webp'" href="https://lasmananitas.com.mx/es/galeria" [span_text]="'Instalaciones'" [imagePosition]="'object-bottom'" /> -->

            <div-sections [url_img]="'/images/empresarial.png'" [route]="'/events/corporate-events'" [span_text]="'div_sections_home.corporate_events' | translate" [imagePosition]="'object-bottom'" />

            <div-sections [url_img]="'/images/sociales2.jpg'" [route]="'/events/social-events'" [span_text]="'div_sections_home.social_events' | translate" [imagePosition]="'object-center'" />

            <!-- Ofertas -->
            <div-section-big [url_img]="'/images/experiencias.jpeg'" [route]="'/offers-experiences'" [span_text]="'div_sections_home.offers_experiences' | translate" />
        </div>
    </div>

<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Programa de lealtad'" [url_site]="'/hotel-services'"></header-list>
    <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">
        <!-- ENCABEZADO -->
        <div class="pt-8 mb-10 text-center">
            <h2 class="text-3xl font-semibold text-gray-800">Niveles disponibles</h2>
            <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
        </div>
        <!-- BADGES -->
        <div class="grid grid-cols-3 gap-4 mb-0">
            @for (level of levels; track level.id) {
            <div class="flex justify-center">
                <img [src]="level.image" [alt]="level.name" class="h-36 w-36 object-contain drop-shadow-lg" />
            </div>
            }
        </div>
        <!-- CARDS -->
        <div class="grid grid-cols-3 gap-4">
            @for (level of levels; track level.id) {
            <div class="rounded-2xl overflow-hidden border-2" [class]="level.color">
                <!-- Header -->
                <div class="py-3 text-center" [class]="level.headerColor">
                    <span class="text-white font-bold tracking-widest text-sm">{{ level.name }}</span>
                </div>
                <!-- Noches -->
                <div class="bg-white py-6 text-center border-b border-gray-100">
                    <span class="text-5xl font-light text-gray-800">{{ level.nights }}</span>
                    <span class="text-gray-400 text-sm ml-1">Noches</span>
                </div>
                <!-- Beneficios -->
                <div class="bg-white">
                    @for (benefit of level.benefits; track benefit; let last = $last) {
                    <div class="px-4 py-3 text-center text-xs text-gray-600 uppercase tracking-wide"
                        [class.border-b]="!last" [class.border-gray-100]="!last">
                        {{ benefit }}
                    </div>
                    }
                </div>
            </div>
            }
        </div>
    </div>
</div>
<footer-component />

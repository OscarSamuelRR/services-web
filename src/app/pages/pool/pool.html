<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'pool.title' | translate" [url_site]="'/hotel-services'"></header-list>
    <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">
        <div class="pt-8 mb-6 text-center">
            <h2 class="text-3xl font-semibold text-gray-800">{{ 'pool.subtitle' | translate }}</h2>
            <p class="text-gray-400 text-base mt-2">{{ 'pool.more_info' | translate }} <strong class="text-gray-700">Ext.
                    201</strong></p>
            <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
        </div>
        <div class="mb-8">
            <h3 class="text-2xl font-semibold text-[#00633a] mb-4 text-center">{{ 'pool.section_title' | translate }}</h3>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                @for (rule of rules; track $index; let last = $last) {
                <div class="flex items-start gap-4 px-6 py-5" [class.border-b]="!last" [class.border-gray-100]="!last">
                    <!-- <span class="w-2 h-2 rounded-full bg-[#00633a] flex-shrink-0 mt-2"></span> -->
                    <p class="text-gray-700 text-base md:text-base">{{ rule.text | translate }}</p>
                </div>
                }
            </div>
        </div>
        <div class="mt-10 bg-[#00633a]/10 rounded-2xl px-6 py-5 flex flex-col items-center text-center gap-3">
            <svg class="w-6 h-6 text-[#00633a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-[#00633a] text-base">
                {{ 'common.contact_note' | translate }}<strong> 201 </strong>{{ 'common.contact_note_end' | translate }}
            </p>
        </div>
    </div>
</div>
<footer-component />

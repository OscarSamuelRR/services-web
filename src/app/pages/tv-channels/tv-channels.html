<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Amenidades del hotel'" [url_site]="'/hotel-services'"></header-list>
    <div class="px-4 md:px-12 lg:px-32 xl:px-64 pb-10">
        <!-- ENCABEZADO -->
        <div class="pt-8 mb-6 text-center">
            <h2 class="text-3xl font-semibold text-gray-800">Canales de T.V disponibles</h2>
            <!-- <p class="text-gray-400 text-base mt-2">Tomaremos su orden.</p> -->
            <p>Mas información en la <strong>Ext. 201</strong></p>
            <div class="w-12 h-px bg-[#00633a] mx-auto mt-3"></div>
        </div>
        <!-- LISTADO -->
        @for (category of categories; track category) {
            <div class="mb-6">
                <!-- Título categoría -->
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-[#00633a] font-bold text-2xl md:text-3xl lg:text-4xl tracking-wide italic">{{ category }}</span>
                    <div class="flex-1 h-px bg-[#00633a]/20"></div>
                </div>
                <!-- Grid de canales -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    @for (channel of getByCategory(category); track channel.id) {
                        <div class="bg-white rounded-2xl shadow-sm px-4 py-3 flex items-center gap-3 hover:shadow-md transition-shadow">
                            <span class="w-9 h-9 rounded-full bg-[#00633a]/10 text-[#00633a] font-bold text-base flex items-center justify-center flex-shrink-0">
                                {{ channel.id }}
                            </span>
                            <p class="text-gray-700 text-md font-medium leading-tight">{{ channel.name }}</p>
                        </div>
                    }
                </div>
            </div>
        }
        <!-- NOTA INFORMATIVA -->

            </p>
        </div> -->
    </div>
</div>

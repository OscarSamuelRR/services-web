<div class="min-h-screen bg-gray-50 font-sans">
    <header-list [h1_text]="'Servicios del hotel'" [url_site] = "''"></header-list>
    <!-- GRID DE SECCIONES -->
    <div class="px-4 pb-6">
        <h2 class="pt-6 text-xl font-semibold text-gray-800 mb-4">Servicios del hotel</h2>
        <div class="grid grid-cols-2 gap-3">
            <div-sections [url_img]="'/images/habitaciones.jpg'" [route]="'/rooms'" [span_text]="'Habitaciones'" [imagePosition]="'object-center'" />
    
            <div-sections [url_img]="'/images/amen2.jpg'" [route]="'/amenities'" [span_text]="'Amenidades'" [imagePosition]="'object-center'" />
           
            <div-sections [url_img]="'/images/servr.JPG'" [route]="'/services-reception'" [span_text]="'Servicios de recepción'" [imagePosition]="'object-center'" />
    
            <div-sections [url_img]="'/images/asist.jpg'" [route]="'/assistance'" [span_text]="'Asistencia'" [imagePosition]="'object-bottom'" />

            <div-sections [url_img]="'/images/naranja.jpg'" [route]="'/laundry'" [span_text]="'Lavanderia'" [imagePosition]="'object-center'" />

            <div-sections [url_img]="'/images/pavo1.jpg'" [route]="'/tv-channels'" [span_text]="'Canales de TV'" />

            <div-sections [url_img]="'/images/reglamento3.jpg'" [route]="'/hotel-rules'" [span_text]="'Reglamento'" [imagePosition]="'object-center'" />

            <div-sections [url_img]="'/images/Piscina.jpg'" [route]="'/pool'" [span_text]="'Piscina'" />

            <div-section-big [url_img]="'/images/recepcion1.jpg'" [route]="'/loyalty-program'" [span_text]="'Programa de lealtad'" />
        </div>
    </div>
</div>
<footer-component />
